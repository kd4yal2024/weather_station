<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aviation Desk</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111e;
        --panel: rgba(10, 20, 39, 0.94);
        --panel-soft: rgba(255, 255, 255, 0.04);
        --border: rgba(133, 201, 255, 0.16);
        --text: #edf6ff;
        --muted: #97adc3;
        --accent: #69d2ff;
        --accent-2: #53d6c7;
        --danger: #ff8f8f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(105, 210, 255, 0.12), transparent 28%),
          linear-gradient(160deg, #091321 0%, #030811 100%);
      }

      .shell {
        min-height: 100vh;
        min-height: 100dvh;
        padding: 16px;
      }

      .card {
        max-width: 920px;
        margin: 0 auto;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 18px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.28);
      }

      .header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 14px;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.7rem;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .status {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--panel-soft);
        font-size: 0.82rem;
        white-space: nowrap;
      }

      .status.online {
        color: var(--accent-2);
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 10px;
        margin-bottom: 14px;
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        padding: 12px 14px;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 12px 16px;
        cursor: pointer;
        font-weight: 600;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), #1c9dff);
        color: #03111f;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .notice {
        min-height: 1.4em;
        margin: 0 0 14px;
        color: var(--muted);
      }

      .notice.error {
        color: var(--danger);
      }

      .board-label {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      .table-wrap {
        overflow-x: auto;
      }

      th,
      td {
        padding: 12px 10px;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      th {
        color: var(--accent);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      td pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.84rem;
      }

      .empty {
        padding: 24px 12px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <main class="card">
        <header class="header">
          <div>
            <p class="eyebrow">Main Aviation Page</p>
            <h1>METAR Desk</h1>
            <p class="subtitle">Use this page to load stations and launch TAF only when you want forecast detail.</p>
          </div>
          <div id="socket_status" class="status">Connecting</div>
        </header>

        <form id="metar_form" class="toolbar">
          <input id="airport_id" name="ID" type="text" maxlength="8" autocomplete="off" placeholder="Enter ICAO airport, ex: KJAX" />
          <button type="submit" class="primary">Get METAR</button>
          <button id="clear_button" type="button" class="secondary">Clear</button>
        </form>

        <p id="notice" class="notice"></p>
        <p class="board-label">Active METAR stations. TAF stays a secondary drill-down from this board.</p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Airport</th>
                <th>METAR</th>
                <th>Forecast</th>
              </tr>
            </thead>
            <tbody id="display"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script>
      const display = document.getElementById("display");
      const notice = document.getElementById("notice");
      const socketStatus = document.getElementById("socket_status");
      const metarForm = document.getElementById("metar_form");
      const airportInput = document.getElementById("airport_id");
      const clearButton = document.getElementById("clear_button");
      const socketProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const socket = new WebSocket(`${socketProtocol}//${window.location.host}/ws_aviation`);
      const tafChannel = new BroadcastChannel("wx-station-taf");
      const lastTafAirportKey = "wx-station-last-taf-airport";
      let tafWindow = null;
      let metarOrder = [];
      const isMobileViewport = () => window.matchMedia("(max-width: 820px), (pointer: coarse)").matches;

      const openTafBoard = airport => {
        localStorage.setItem(lastTafAirportKey, airport);

        if (isMobileViewport()) {
          window.open(`/taf?airport=${encodeURIComponent(airport)}`, "_blank");
          return;
        }

        if (tafWindow && !tafWindow.closed) {
          tafWindow.focus();
          tafChannel.postMessage({ airport });
          return;
        }

        const popupWidth = 760;
        const popupHeight = 640;
        const left = Math.max(window.screenX + window.outerWidth + 20, 0);
        const top = Math.max(window.screenY + 20, 0);
        tafWindow = window.open(
          "/taf",
          "TAF",
          `width=${popupWidth},height=${popupHeight},left=${left},top=${top}`
        );
        tafWindow?.focus();

        window.setTimeout(() => {
          tafChannel.postMessage({ airport });
        }, 250);
      };

      const setStatus = (label, online = false) => {
        socketStatus.textContent = label;
        socketStatus.classList.toggle("online", online);
      };

      const setNotice = (message, isError = false) => {
        notice.textContent = message || "";
        notice.classList.toggle("error", isError);
      };

      const sanitizeAirport = value => value.trim().toUpperCase();

      const moveAirportToTop = airport => {
        metarOrder = [airport, ...metarOrder.filter(entry => entry !== airport)];
      };

      const syncMetarOrder = entries => {
        const airports = entries.map(entry => entry.airport);
        metarOrder = [
          ...metarOrder.filter(airport => airports.includes(airport)),
          ...airports.filter(airport => !metarOrder.includes(airport)),
        ];
      };

      const sendRequest = payload => {
        if (socket.readyState !== WebSocket.OPEN) {
          setNotice("Aviation socket is not connected yet.", true);
          return;
        }
        socket.send(JSON.stringify(payload));
      };

      const renderRows = entries => {
        display.replaceChildren();
        if (!entries.length) {
          metarOrder = [];
          const row = document.createElement("tr");
          const cell = document.createElement("td");
          cell.colSpan = 3;
          cell.className = "empty";
          cell.textContent = "No METAR stations loaded yet.";
          row.appendChild(cell);
          display.appendChild(row);
          return;
        }

        syncMetarOrder(entries);
        const orderedEntries = metarOrder
          .map(airport => entries.find(entry => entry.airport === airport))
          .filter(Boolean);

        orderedEntries.forEach(entry => {
          const row = document.createElement("tr");

          const airportCell = document.createElement("td");
          airportCell.textContent = entry.airport;

          const metarCell = document.createElement("td");
          const metarPre = document.createElement("pre");
          metarPre.textContent = entry.metar || "No METAR available.";
          metarCell.appendChild(metarPre);

          const tafCell = document.createElement("td");
          const tafButton = document.createElement("button");
          tafButton.type = "button";
          tafButton.className = "secondary";
          tafButton.textContent = "View TAF";
          tafButton.addEventListener("click", () => {
            openTafBoard(entry.airport);
          });
          tafCell.appendChild(tafButton);

          row.appendChild(airportCell);
          row.appendChild(metarCell);
          row.appendChild(tafCell);
          display.appendChild(row);
        });
      };

      socket.addEventListener("open", () => {
        setStatus("Online", true);
        setNotice("Connected to aviation socket.");
        sendRequest({ kind: "snapshot" });
      });

      socket.addEventListener("close", () => {
        setStatus("Offline");
        setNotice("Aviation socket disconnected.", true);
      });

      socket.addEventListener("error", () => {
        setStatus("Offline");
        setNotice("Aviation socket error.", true);
      });

      socket.addEventListener("message", event => {
        let payload = null;
        try {
          payload = JSON.parse(event.data);
        } catch (_error) {
          setNotice("Received invalid aviation payload.", true);
          return;
        }

        if (payload.error) {
          setNotice(payload.error, true);
          return;
        }

        if (payload.kind === "metar" && payload.airport) {
          moveAirportToTop(payload.airport);
        }
        renderRows(Array.isArray(payload.entries) ? payload.entries : []);
        if (payload.kind === "clear") {
          setNotice("Cleared METAR and TAF entries.");
        } else if (payload.kind === "metar" && payload.airport) {
          setNotice(`Loaded METAR for ${payload.airport}.`);
        } else if (payload.kind === "snapshot") {
          setNotice("Aviation list ready.");
        } else {
          setNotice("");
        }
      });

      metarForm.addEventListener("submit", event => {
        event.preventDefault();
        const airport = sanitizeAirport(airportInput.value);
        if (!airport) {
          setNotice("Enter an airport ID first.", true);
          return;
        }
        sendRequest({ kind: "metar", airport });
        airportInput.value = airport;
      });

      clearButton.addEventListener("click", () => {
        localStorage.removeItem(lastTafAirportKey);
        sendRequest({ kind: "clear" });
        if (tafWindow && !tafWindow.closed) {
          tafWindow.close();
        }
      });
    </script>
  </body>
</html>
